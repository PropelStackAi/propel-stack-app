<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4F35C2" />
    <title>Offline — Propel Stack AI</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        background: #4F35C2;
        color: #ffffff;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 1.5rem;
      }
      .wrap { max-width: 24rem; }
      .logo { display: grid; grid-template-columns: 16px 16px; gap: 4px; justify-content: center; margin-bottom: 1.25rem; }
      .logo span { width: 16px; height: 16px; border-radius: 4px; display: block; }
      h1 { font-size: 1.5rem; font-weight: 800; margin: 0 0 0.5rem; }
      p { color: rgba(255, 255, 255, 0.85); line-height: 1.5; margin: 0; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo" aria-hidden="true">
        <span style="background:#ffffff"></span>
        <span style="background:#F05A28"></span>
        <span style="background:#01696F"></span>
        <span style="background:#6B21A8"></span>
      </div>
      <h1>You are offline</h1>
      <p>Propel Stack AI will reconnect automatically as soon as your connection returns.</p>
    </div>
  </body>
</html>
